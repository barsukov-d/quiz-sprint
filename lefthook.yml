pre-commit:
  commands:
    bd-flush:
      run: bash scripts/pre-commit-bd.sh

    format:
      root: "tma/"
      glob: "**/*"
      run: pnpm format

    lint:
      root: "tma/"
      glob: "**/*"
      run: pnpm lint

    type-check:
      root: "tma/"
      glob: "**/*"
      run: pnpm run type-check

    backend-test:
      root: "backend/"
      glob: "**/*.go"
      run: go test ./...
